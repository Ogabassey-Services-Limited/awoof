name: Actionlint

on:
  push:
    branches: [main]
    paths:
      - ".github/workflows/**"
      - ".github/actionlint.yml"
  pull_request:
    branches: [main]
    paths:
      - ".github/workflows/**"
      - ".github/actionlint.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: actionlint-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  actionlint:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run actionlint
        uses: rhysd/actionlint@v1
